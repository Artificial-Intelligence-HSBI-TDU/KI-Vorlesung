name: Handout (Docsify plus PDF)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lecture-repo (fully)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch cagix/pandoc-lecture-zen@master
        run: make update_tooling

      - name: Build materials
        run: |
          make docsify
          make clean
          make pdf ROOT_DOC=readme_tdu.md BOOK_SRC=book_tdu.md
          make clean
          make pdf ROOT_DOC=readme_hsbi.md BOOK_SRC=book_hsbi.md

      - name: Publish materials
        run: make publish_orphan
